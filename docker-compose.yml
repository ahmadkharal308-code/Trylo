# Local development database for Trylo.
# Run `docker compose up -d` to start a local PostgreSQL instance, then the
# backend connects to it using the DATABASE_URL in apps/backend/.env.
#
# This is for LOCAL DEVELOPMENT ONLY — production uses a managed Postgres.
services:
  postgres:
    image: postgres:16
    container_name: trylo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trylo
      POSTGRES_PASSWORD: trylo_local_dev
      POSTGRES_DB: trylo
    ports:
      # host:container — host port 5432 maps to Postgres inside the container
      - "5432:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trylo -d trylo"]
      interval: 5s
      timeout: 5s
      retries: 5
